<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyBot AI - Live Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <nav class="navbar">
        <div class="logo">
            <span class="gradient-text">PolyBot AI</span> Live
        </div>
        <div class="nav-links">
            <div id="connection-status" class="status-indicator">
                <div class="dot red" id="status-dot"></div>
                <span id="status-text">Connecting...</span>
            </div>
        </div>
    </nav>

    <main class="dashboard-container">
        
        <!-- KPIs -->
        <div class="kpi-grid">
            <div class="kpi-card glass-card">
                <h3>Balance Actual</h3>
                <div class="kpi-value" id="kpi-balance">$0.00</div>
            </div>
            <div class="kpi-card glass-card">
                <h3>PnL Total</h3>
                <div class="kpi-value" id="kpi-pnl">$0.00</div>
            </div>
            <div class="kpi-card glass-card">
                <h3>Posiciones Abiertas</h3>
                <div class="kpi-value" id="kpi-open">0</div>
            </div>
        </div>

        <!-- Chart Section -->
        <div class="chart-section glass-card">
            <div class="section-header">
                <h2>Crecimiento de Cartera</h2>
            </div>
            <div class="canvas-container">
                <canvas id="balanceChart"></canvas>
            </div>
        </div>

        <!-- Tables Section -->
        <div class="tables-grid">
            <!-- Active Positions -->
            <div class="table-card glass-card">
                <div class="section-header">
                    <h2>Inversiones Activas</h2>
                    <span class="badge" id="active-count">0</span>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Mercado</th>
                                <th>Decisión</th>
                                <th>Invertido</th>
                                <th>Fecha</th>
                            </tr>
                        </thead>
                        <tbody id="active-tbody">
                            <tr><td colspan="4" class="text-center text-muted">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Recent Trades -->
            <div class="table-card glass-card">
                <div class="section-header">
                    <h2>Últimas Resoluciones</h2>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Mercado</th>
                                <th>Decisión</th>
                                <th>PnL</th>
                            </tr>
                        </thead>
                        <tbody id="recent-tbody">
                            <tr><td colspan="3" class="text-center text-muted">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
